<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aria — Think Together</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #0d0e12;
  --glow: #6c8bff;
  --glow2: #ff6b9d;
  --glow3: #ffd166;
  --serif: 'Instrument Serif', Georgia, serif;
  --sans: 'Geist', sans-serif;
  --mono: 'Geist Mono', monospace;
}

html, body {
  height: 100%;
  font-family: var(--sans);
  background: var(--ink);
  color: #e8e6e1;
  overflow: hidden;
  cursor: none;
}

/* ─── Custom Cursor ─── */
#cursor {
  position: fixed;
  width: 10px; height: 10px;
  background: var(--glow);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width .2s, height .2s, background .2s;
  mix-blend-mode: screen;
}
#cursor-ring {
  position: fixed;
  width: 34px; height: 34px;
  border: 1.5px solid rgba(108,139,255,.45);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%,-50%);
}
body:has(#input:focus) #cursor { width: 16px; height: 16px; background: var(--glow2); }

/* ─── Living Background Canvas ─── */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ─── Noise overlay ─── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
}

/* ─── Layout ─── */
#app {
  position: relative;
  z-index: 2;
  height: 100dvh;
  display: grid;
  grid-template-rows: auto 1fr auto;
}

/* ─── Header ─── */
#header {
  padding: 22px 32px 18px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,.05);
}

.brand-name {
  font-family: var(--serif);
  font-size: 1.6rem;
  letter-spacing: -.02em;
  line-height: 1;
  color: #fff;
  font-style: italic;
}

.brand-tagline {
  font-size: .62rem;
  font-family: var(--mono);
  color: rgba(255,255,255,.28);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-top: 3px;
}

.header-pills {
  display: flex;
  align-items: center;
  gap: 8px;
}

.hpill {
  font-family: var(--mono);
  font-size: .63rem;
  padding: 5px 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.1);
  background: rgba(255,255,255,.04);
  color: rgba(255,255,255,.38);
  display: flex;
  align-items: center;
  gap: 6px;
  backdrop-filter: blur(8px);
}

.hpill.live {
  border-color: rgba(108,139,255,.3);
  color: var(--glow);
  background: rgba(108,139,255,.07);
}

.pulse-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--glow);
  animation: pdot 2.2s ease infinite;
}

@keyframes pdot {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:.35; transform:scale(.55); }
}

/* ─── Feed ─── */
#feed {
  overflow-y: auto;
  overflow-x: hidden;
  padding: 32px 0 12px;
  scroll-behavior: smooth;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#feed::-webkit-scrollbar { width: 3px; }
#feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,.07); border-radius: 2px; }

/* ─── Welcome ─── */
#welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 24px 40px;
  text-align: center;
  animation: wfade .7s ease both;
}

@keyframes wfade {
  from { opacity:0; transform:translateY(22px); }
  to   { opacity:1; transform:translateY(0); }
}

.orb {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, var(--glow), var(--glow2), var(--glow3), var(--glow));
  animation: spin 7s linear infinite;
  margin-bottom: 22px;
  filter: blur(1px);
  box-shadow: 0 0 42px rgba(108,139,255,.45), 0 0 90px rgba(108,139,255,.12);
  position: relative;
}

.orb-inner {
  position: absolute;
  inset: 8px;
  border-radius: 50%;
  background: var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  animation: counter-spin 7s linear infinite;
  filter: blur(0);
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes counter-spin { to { transform: rotate(-360deg); } }

.welcome-title {
  font-family: var(--serif);
  font-style: italic;
  font-size: 2.1rem;
  letter-spacing: -.03em;
  color: #fff;
  margin-bottom: 10px;
  line-height: 1.2;
}

.welcome-sub {
  font-size: .82rem;
  color: rgba(255,255,255,.38);
  line-height: 1.7;
  max-width: 310px;
  margin: 0 auto 32px;
}

.spark-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  max-width: 560px;
  width: 100%;
}

.spark {
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 14px;
  padding: 13px 14px;
  text-align: left;
  cursor: none;
  transition: all .25s cubic-bezier(.22,.9,.36,1);
  animation: sfade .45s ease both;
  animation-delay: calc(var(--i) * .065s);
  position: relative;
  overflow: hidden;
}

@keyframes sfade {
  from { opacity:0; transform:scale(.9) translateY(12px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

.spark::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(108,139,255,.14), transparent 65%);
  opacity: 0;
  transition: opacity .3s;
}

.spark:hover::before { opacity: 1; }
.spark:hover {
  border-color: rgba(108,139,255,.32);
  background: rgba(108,139,255,.06);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,.25);
}

.spark-icon { font-size: 1.05rem; margin-bottom: 7px; display: block; }
.spark-text { font-size: .74rem; color: rgba(255,255,255,.5); line-height: 1.45; }

/* ─── Message entries ─── */
.entry {
  width: 100%;
  max-width: 700px;
  padding: 0 28px;
  margin-bottom: 6px;
  animation: emerge .38s cubic-bezier(.22,.9,.36,1) both;
}

@keyframes emerge {
  from { opacity:0; transform:translateY(18px) scale(.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

/* User — editorial, italic, right-aligned */
.entry.user {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.user-label {
  font-family: var(--mono);
  font-size: .58rem;
  color: rgba(255,255,255,.22);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.user-text {
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.22rem;
  line-height: 1.55;
  color: rgba(255,255,255,.88);
  text-align: right;
  max-width: 85%;
  position: relative;
  padding-right: 16px;
}

.user-text::after {
  content: '"';
  position: absolute;
  top: -8px; right: -2px;
  font-size: 2.8rem;
  color: rgba(108,139,255,.15);
  font-family: var(--serif);
  line-height: 1;
  pointer-events: none;
}

/* AI — left, structured */
.entry.ai {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.ai-eyebrow {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 10px;
}

.ai-sigil {
  width: 26px; height: 26px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--glow), var(--glow2));
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem;
  box-shadow: 0 0 14px rgba(108,139,255,.45);
  flex-shrink: 0;
}

.ai-name {
  font-family: var(--mono);
  font-size: .6rem;
  color: var(--glow);
  letter-spacing: .07em;
  text-transform: uppercase;
}

.ai-time {
  font-family: var(--mono);
  font-size: .57rem;
  color: rgba(255,255,255,.2);
  margin-top: 1px;
}

.ai-body {
  font-size: .88rem;
  line-height: 1.8;
  color: rgba(255,255,255,.75);
  max-width: 95%;
  white-space: pre-wrap;
  word-break: break-word;
}

.cbadge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: .56rem;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(34,197,94,.1);
  border: 1px solid rgba(34,197,94,.18);
  color: #4ade80;
  margin-left: 5px;
  animation: badgePop .32s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes badgePop {
  from { opacity:0; transform:scale(.5); }
  to   { opacity:1; transform:scale(1); }
}

.divider {
  width: 100%; max-width: 700px;
  padding: 6px 28px 14px;
}

.divider-line {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.05) 35%, rgba(255,255,255,.05) 65%, transparent);
}

/* ─── Thinking ─── */
.thinking-entry {
  width: 100%; max-width: 700px;
  padding: 0 28px;
  margin-bottom: 8px;
  animation: emerge .28s ease both;
}

.thinking {
  display: flex;
  align-items: center;
  gap: 10px;
}

.think-orb {
  width: 26px; height: 26px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--glow), var(--glow2));
  box-shadow: 0 0 12px rgba(108,139,255,.4);
  animation: tpulse 1.6s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes tpulse {
  0%,100% { box-shadow: 0 0 10px rgba(108,139,255,.4); }
  50% { box-shadow: 0 0 26px rgba(108,139,255,.8), 0 0 52px rgba(108,139,255,.2); }
}

.think-label {
  font-family: var(--mono);
  font-size: .66rem;
  color: rgba(255,255,255,.28);
  letter-spacing: .04em;
}

.think-dots span {
  display: inline-block;
  width: 4px; height: 4px;
  background: var(--glow);
  border-radius: 50%;
  margin: 0 1.5px;
  animation: tdot 1.2s ease infinite;
}
.think-dots span:nth-child(2) { animation-delay: .2s; }
.think-dots span:nth-child(3) { animation-delay: .4s; }

@keyframes tdot {
  0%,80%,100% { opacity:.2; transform:scaleY(.5); }
  40% { opacity:1; transform:scaleY(1.6); }
}

.entry.error .ai-body { color: #fca5a5; }

/* ─── Input ─── */
#bottom {
  padding: 14px 28px 22px;
  border-top: 1px solid rgba(255,255,255,.05);
}

.input-container {
  max-width: 700px;
  margin: 0 auto;
  position: relative;
}

.input-glow {
  position: absolute;
  inset: -3px;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(108,139,255,0), rgba(255,107,157,0));
  z-index: -1;
  transition: all .35s ease;
  filter: blur(10px);
}

.input-container:focus-within .input-glow {
  background: linear-gradient(135deg, rgba(108,139,255,.4), rgba(255,107,157,.3));
  opacity: .65;
}

.input-inner {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 18px;
  padding: 12px 12px 12px 20px;
  backdrop-filter: blur(20px);
  transition: border-color .3s;
}

.input-container:focus-within .input-inner {
  border-color: rgba(108,139,255,.42);
  background: rgba(255,255,255,.07);
}

#input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: rgba(255,255,255,.85);
  font-family: var(--sans);
  font-size: .87rem;
  resize: none;
  max-height: 140px;
  line-height: 1.65;
  caret-color: var(--glow);
}

#input::placeholder { color: rgba(255,255,255,.18); font-style: italic; }

#send {
  flex-shrink: 0;
  width: 40px; height: 40px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--glow), var(--glow2));
  color: #fff;
  cursor: none;
  display: flex;
  align-items: center;
  justify-content: center;
  align-self: flex-end;
  box-shadow: 0 4px 18px rgba(108,139,255,.5);
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s;
  font-size: 1.1rem;
}

#send:hover { transform: scale(1.14) rotate(-6deg); box-shadow: 0 6px 28px rgba(108,139,255,.65); }
#send:active { transform: scale(.88); }
#send:disabled { background: rgba(255,255,255,.07); box-shadow: none; opacity: .4; }

.input-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 7px;
  padding: 0 4px;
}

.input-hint {
  font-family: var(--mono);
  font-size: .6rem;
  color: rgba(255,255,255,.17);
}

.cache-rate {
  font-family: var(--mono);
  font-size: .6rem;
  color: rgba(255,255,255,.17);
  transition: color .3s;
}

.cache-rate.hot { color: #4ade80; }

/* ─── Responsive ─── */
@media (max-width: 600px) {
  #header { padding: 16px 16px 14px; }
  #bottom { padding: 10px 14px 18px; }
  .entry { padding: 0 14px; }
  .spark-grid { grid-template-columns: repeat(2, 1fr); }
  .welcome-title { font-size: 1.7rem; }
  .orb { width: 56px; height: 56px; }
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="bg-canvas"></canvas>

<div id="app">

  <div id="header">
    <div>
      <div class="brand-name">Aria</div>
      <div class="brand-tagline">Think together &nbsp;·&nbsp; AI</div>
    </div>
    <div class="header-pills">
      <div class="hpill" id="cache-pill">⚡ <span id="cache-count">0 cached</span></div>
      <div class="hpill live"><div class="pulse-dot"></div><span id="status-text">phi3:mini</span></div>
    </div>
  </div>

  <div id="feed">
    <div id="welcome">
      <div class="orb"><div class="orb-inner">✦</div></div>
      <div class="welcome-title">What's on your mind?</div>
      <div class="welcome-sub">I'm Aria — your thinking partner. Ask anything: code, ideas, curiosity, or just a good chat ✦</div>
      <div class="spark-grid">
        <button class="spark" style="--i:0" onclick="useSpark(this)">
          <span class="spark-icon">🔬</span>
          <span class="spark-text">Explain quantum entanglement simply</span>
        </button>
        <button class="spark" style="--i:1" onclick="useSpark(this)">
          <span class="spark-icon">🐍</span>
          <span class="spark-text">Write a Python binary search</span>
        </button>
        <button class="spark" style="--i:2" onclick="useSpark(this)">
          <span class="spark-icon">🤔</span>
          <span class="spark-text">What is the Turing test?</span>
        </button>
        <button class="spark" style="--i:3" onclick="useSpark(this)">
          <span class="spark-icon">📡</span>
          <span class="spark-text">TCP vs UDP — key differences</span>
        </button>
        <button class="spark" style="--i:4" onclick="useSpark(this)">
          <span class="spark-icon">🎨</span>
          <span class="spark-text">Color theory for UI designers</span>
        </button>
        <button class="spark" style="--i:5" onclick="useSpark(this)">
          <span class="spark-icon">🧠</span>
          <span class="spark-text">How does GPT actually work?</span>
        </button>
      </div>
    </div>
  </div>

  <div id="bottom">
    <div class="input-container">
      <div class="input-glow"></div>
      <div class="input-inner">
        <textarea id="input" rows="1" placeholder="Ask me anything…" maxlength="4000"></textarea>
        <button id="send" onclick="sendMessage()" title="Send">↑</button>
      </div>
    </div>
    <div class="input-footer">
      <span class="input-hint" id="hint-text">↵ send &nbsp;·&nbsp; ⇧↵ newline</span>
      <span class="cache-rate" id="cache-rate-label">cache rate: —</span>
    </div>
  </div>

</div>

<script>
// ─── Custom cursor ────────────────────────────────
const cur = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx=0, my=0, rx=0, ry=0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx+'px'; cur.style.top = my+'px';
});
(function animRing() {
  rx += (mx-rx)*.11; ry += (my-ry)*.11;
  ring.style.left = rx+'px'; ring.style.top = ry+'px';
  requestAnimationFrame(animRing);
})();

// hover effects
document.querySelectorAll('.spark').forEach(el => {
  el.addEventListener('mousemove', e => {
    const r = el.getBoundingClientRect();
    el.style.setProperty('--mx', ((e.clientX-r.left)/r.width*100)+'%');
    el.style.setProperty('--my', ((e.clientY-r.top)/r.height*100)+'%');
  });
});

// ─── Animated background ─────────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); addEventListener('resize', resize);

const pts = Array.from({length:52}, () => ({
  x: Math.random()*2000-500, y: Math.random()*1500-250,
  vx: (Math.random()-.5)*.28, vy: (Math.random()-.5)*.28,
  r: Math.random()*1.7+.4,
  h: [230,320,45][Math.floor(Math.random()*3)],
  life: Math.random()*Math.PI*2
}));

(function drawBg() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0d0e12'; ctx.fillRect(0,0,W,H);

  [[W*.15,H*.22,380,'rgba(70,88,255,.11)'],[W*.84,H*.73,320,'rgba(255,100,150,.08)'],[W*.5,H*.48,260,'rgba(255,200,90,.05)']].forEach(([x,y,r,c])=>{
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,c); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  });

  pts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life+=.011;
    if(p.x<-50)p.x=W+50; if(p.x>W+50)p.x=-50;
    if(p.y<-50)p.y=H+50; if(p.y>H+50)p.y=-50;
    const a=(Math.sin(p.life)*.5+.5)*.5+.08;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`hsla(${p.h},78%,70%,${a})`; ctx.fill();
  });

  for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
    const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<115){
      ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
      ctx.strokeStyle=`rgba(108,139,255,${(.075*(1-d/115)).toFixed(3)})`; ctx.lineWidth=.5; ctx.stroke();
    }
  }
  requestAnimationFrame(drawBg);
})();

// ─── Chat state ───────────────────────────────────
const feed = document.getElementById('feed');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const hintEl = document.getElementById('hint-text');
const cacheRateEl = document.getElementById('cache-rate-label');
const cacheCount = document.getElementById('cache-count');
const statusText = document.getElementById('status-text');
let stats = {hits:0, total:0}, hintTimer=null;

const thinkPhrases = ['reasoning…','thinking…','connecting dots…','retrieving…','processing…','considering…','reflecting…'];

inputEl.addEventListener('input', ()=>{
  inputEl.style.height='auto';
  inputEl.style.height=Math.min(inputEl.scrollHeight,140)+'px';
});
inputEl.addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function scrollFeed(){feed.scrollTo({top:feed.scrollHeight,behavior:'smooth'});}
function setHint(html,ms=3600){
  clearTimeout(hintTimer);
  hintEl.innerHTML=html;
  hintTimer=setTimeout(()=>{hintEl.innerHTML='↵ send &nbsp;·&nbsp; ⇧↵ newline';},ms);
}

function removeWelcome(){
  const w=document.getElementById('welcome');
  if(w){w.style.transition='opacity .28s ease,transform .28s ease';w.style.opacity='0';w.style.transform='scale(.95) translateY(-8px)';setTimeout(()=>w.remove(),280);}
}

function addDivider(){
  const d=document.createElement('div');d.className='divider';
  d.innerHTML='<div class="divider-line"></div>';feed.appendChild(d);
}

function appendUser(text){
  removeWelcome();
  const el=document.createElement('div');el.className='entry user';
  el.innerHTML=`<div class="user-label">you</div><div class="user-text">${esc(text)}</div>`;
  feed.appendChild(el);scrollFeed();
}

function appendAI(text,meta={}){
  const el=document.createElement('div');el.className='entry ai';
  const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  let badges='';
  if(meta.cached) badges+=`<span class="cbadge">⚡ cached${meta.cacheAge?` · ${meta.cacheAge}`:''}</span>`;
  if(meta.deduped) badges+=`<span class="cbadge" style="background:rgba(108,139,255,.1);border-color:rgba(108,139,255,.22);color:#818cf8">↗ deduped</span>`;
  el.innerHTML=`
    <div class="ai-eyebrow">
      <div class="ai-sigil">✦</div>
      <div><div class="ai-name">Aria ${badges}</div><div class="ai-time">${time}</div></div>
    </div>
    <div class="ai-body">${esc(text)}</div>`;
  feed.appendChild(el);addDivider();scrollFeed();
}

function appendError(text){
  const el=document.createElement('div');el.className='entry error';
  el.innerHTML=`<div class="ai-eyebrow"><div class="ai-sigil" style="background:linear-gradient(135deg,#ef4444,#f97316)">!</div><div><div class="ai-name">Error</div></div></div><div class="ai-body">${esc(text)}</div>`;
  feed.appendChild(el);scrollFeed();
}

function showThinking(){
  const el=document.createElement('div');el.className='thinking-entry';el.id='thinking-wrap';
  const p=thinkPhrases[Math.floor(Math.random()*thinkPhrases.length)];
  el.innerHTML=`<div class="thinking"><div class="think-orb"></div><span class="think-label">${p}</span><div class="think-dots"><span></span><span></span><span></span></div></div>`;
  feed.appendChild(el);scrollFeed();return el;
}

function updateStats(){
  const rate=stats.total>0?((stats.hits/stats.total)*100).toFixed(0):null;
  cacheCount.textContent=`${stats.hits} cached`;
  if(rate!==null){cacheRateEl.textContent=`cache rate: ${rate}%`;cacheRateEl.classList.toggle('hot',stats.hits>0);}
}

function useSpark(btn){
  inputEl.value=btn.querySelector('.spark-text').textContent;
  inputEl.dispatchEvent(new Event('input'));sendMessage();
}

async function sendMessage(){
  const msg=inputEl.value.trim();
  if(!msg||sendBtn.disabled)return;
  inputEl.value='';inputEl.style.height='auto';sendBtn.disabled=true;
  appendUser(msg);
  const thinking=showThinking();
  const t0=Date.now();
  try{
    const res=await fetch('https://81dc-2401-4900-ca71-860b-153f-645a-a34-fe64.ngrok-free.app/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const data=await res.json();thinking.remove();
    if(!res.ok){appendError('⚠️ '+(data.error||'Something went wrong. Try again!'));}
    else{
      const secs=((Date.now()-t0)/1000).toFixed(2);
      stats.total++;if(data.cached)stats.hits++;updateStats();
      appendAI(data.reply,{cached:data.cached,deduped:data.deduped,cacheAge:data.cacheAge});
      setHint(data.cached?'⚡ served from cache instantly':`🤖 answered in ${secs}s`);
    }
  }catch(err){thinking.remove();appendError('🌐 Network error — '+err.message);}
  finally{sendBtn.disabled=false;inputEl.focus();}
}

async function pollHealth(){
  try{const r=await fetch('/health');if(r.ok){const d=await r.json();statusText.textContent=d.model;cacheCount.textContent=`${d.cache.size}/${d.cache.maxSize}`;}}catch{}
}
pollHealth();setInterval(pollHealth,30000);
</script>
</body>
</html>
