<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #0a0b0f;
    --surface:   #111318;
    --border:    #1e2130;
    --accent:    #5b7fff;
    --accent2:   #7c3aed;
    --cache:     #059669;
    --cache-bg:  #052e1a;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --user-bg:   #1a1f35;
    --ai-bg:     #111318;
    --danger:    #ef4444;
    --radius:    14px;
    --font:      'Sora', sans-serif;
    --mono:      'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,11,15,.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: -.02em;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: .5; transform: scale(.8); }
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: .72rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cache);
  }

  .cache-stats-bar {
    font-size: .68rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* ── Messages ── */
  #messages {
    overflow-y: auto;
    padding: 28px 0;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 20px;
    animation: fadeUp .25s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 24px;
  }

  .msg-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .72rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  .msg-role {
    font-weight: 500;
    color: var(--text);
    font-size: .75rem;
  }

  /* Cache hit badge */
  .cache-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--cache-bg);
    border: 1px solid rgba(5,150,105,.4);
    color: #34d399;
    font-size: .65rem;
    font-weight: 500;
    letter-spacing: .03em;
    animation: cachePop .3s cubic-bezier(.34,1.56,.64,1) both;
  }

  @keyframes cachePop {
    from { opacity: 0; transform: scale(.7); }
    to   { opacity: 1; transform: scale(1); }
  }

  .dedup-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    background: #1e1a3a;
    border: 1px solid rgba(91,127,255,.4);
    color: var(--accent);
    font-size: .65rem;
    font-weight: 500;
  }

  .msg-bubble {
    padding: 14px 18px;
    border-radius: var(--radius);
    line-height: 1.7;
    font-size: .9rem;
    border: 1px solid transparent;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .msg-bubble {
    background: var(--user-bg);
    border-color: rgba(91,127,255,.2);
    color: #c7d2fe;
    margin-left: auto;
    max-width: 80%;
  }

  .msg.ai .msg-bubble {
    background: var(--ai-bg);
    border-color: var(--border);
    max-width: 100%;
  }

  .msg.error .msg-bubble {
    background: rgba(239,68,68,.07);
    border-color: rgba(239,68,68,.3);
    color: #fca5a5;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
    border-radius: var(--radius);
    background: var(--ai-bg);
    border: 1px solid var(--border);
    width: fit-content;
  }

  .typing span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: dot 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }

  @keyframes dot {
    0%, 80%, 100% { transform: scale(.8); opacity: .4; }
    40%            { transform: scale(1.2); opacity: 1; }
  }

  /* ── Input area ── */
  #input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  .input-wrap {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    transition: border-color .2s;
  }

  .input-wrap:focus-within {
    border-color: rgba(91,127,255,.5);
    box-shadow: 0 0 0 3px rgba(91,127,255,.06);
  }

  #input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: .9rem;
    resize: none;
    max-height: 160px;
    line-height: 1.6;
  }

  #input::placeholder { color: var(--muted); }

  #send {
    flex-shrink: 0;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, transform .1s;
    align-self: flex-end;
  }

  #send:hover  { background: #4a6de8; }
  #send:active { transform: scale(.93); }
  #send:disabled { background: var(--border); cursor: not-allowed; }

  .footer-hint {
    max-width: 760px;
    margin: 8px auto 0;
    font-size: .68rem;
    color: var(--muted);
    text-align: center;
    font-family: var(--mono);
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty h2 {
    font-size: 1.4rem;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text);
  }

  .empty p { font-size: .85rem; line-height: 1.6; }

  .empty-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    max-width: 640px;
    margin: 24px auto 0;
  }

  .suggestion {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: .8rem;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: border-color .15s, background .15s;
    font-family: var(--font);
  }

  .suggestion:hover {
    border-color: rgba(91,127,255,.4);
    background: #131720;
  }

  /* Responsive */
  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    .msg-wrap { padding: 0 12px; }
    #input-area { padding: 12px 12px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    AI Chat
  </div>
  <div class="header-meta">
    <div class="status-badge">
      <div class="status-dot"></div>
      <span id="status-text">phi3:mini</span>
    </div>
    <span class="cache-stats-bar" id="cache-stats">cache: — hits</span>
  </div>
</header>

<div id="messages">
  <div class="msg-wrap" id="messages-inner">
    <div class="empty" id="empty-state">
      <h2>What's on your mind?</h2>
      <p>Ask anything. Repeated questions are served instantly from cache.</p>
      <div class="empty-grid">
        <button class="suggestion" onclick="useSuggestion(this)">Explain quantum entanglement simply</button>
        <button class="suggestion" onclick="useSuggestion(this)">Write a Python binary search</button>
        <button class="suggestion" onclick="useSuggestion(this)">What is the Turing test?</button>
        <button class="suggestion" onclick="useSuggestion(this)">Difference between TCP and UDP</button>
      </div>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="Message…" maxlength="4000"></textarea>
    <button id="send" onclick="sendMessage()" title="Send (Enter)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="footer-hint" id="footer-hint">↵ Enter to send &nbsp;·&nbsp; Shift+Enter for newline &nbsp;·&nbsp; <span id="char-count">0</span>/4000</div>
</div>

<script>
const inputEl   = document.getElementById("input");
const sendBtn   = document.getElementById("send");
const msgInner  = document.getElementById("messages-inner");
const messagesEl= document.getElementById("messages");
const emptyEl   = document.getElementById("empty-state");
const cacheStatsEl = document.getElementById("cache-stats");

let stats = { hits: 0, misses: 0, total: 0 };

// Auto-resize textarea
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
  document.getElementById("char-count").textContent = inputEl.value.length;
});

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function useSuggestion(btn) {
  inputEl.value = btn.textContent;
  inputEl.dispatchEvent(new Event("input"));
  sendMessage();
}

function scrollDown() {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: "smooth" });
}

function appendMsg(role, text, meta = {}) {
  if (emptyEl) emptyEl.remove();

  const wrap = document.createElement("div");
  wrap.className = "msg-wrap";

  const msgEl = document.createElement("div");
  msgEl.className = `msg ${role}`;

  // Header row
  const header = document.createElement("div");
  header.className = "msg-header";

  const roleSpan = document.createElement("span");
  roleSpan.className = "msg-role";
  roleSpan.textContent = role === "user" ? "You" : "AI";
  header.appendChild(roleSpan);

  const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  const timeSpan = document.createElement("span");
  timeSpan.textContent = time;
  header.appendChild(timeSpan);

  if (meta.cached) {
    const badge = document.createElement("span");
    badge.className = "cache-badge";
    badge.innerHTML = `⚡ cached${meta.cacheAge ? ` · ${meta.cacheAge} ago` : ""}${meta.cacheHits ? ` · ${meta.cacheHits} hit${meta.cacheHits > 1 ? "s" : ""}` : ""}`;
    header.appendChild(badge);
  }

  if (meta.deduped) {
    const badge = document.createElement("span");
    badge.className = "dedup-badge";
    badge.textContent = "↗ deduped";
    header.appendChild(badge);
  }

  // Bubble
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.textContent = text;

  msgEl.appendChild(header);
  msgEl.appendChild(bubble);
  wrap.appendChild(msgEl);
  msgInner.appendChild(wrap);
  scrollDown();
  return bubble;
}

function showTyping() {
  if (emptyEl && emptyEl.parentNode) emptyEl.remove();

  const wrap = document.createElement("div");
  wrap.className = "msg-wrap";
  wrap.id = "typing-wrap";

  const msgEl = document.createElement("div");
  msgEl.className = "msg ai";

  const header = document.createElement("div");
  header.className = "msg-header";
  const r = document.createElement("span");
  r.className = "msg-role";
  r.textContent = "AI";
  header.appendChild(r);
  msgEl.appendChild(header);

  const t = document.createElement("div");
  t.className = "typing";
  t.innerHTML = "<span></span><span></span><span></span>";
  msgEl.appendChild(t);

  wrap.appendChild(msgEl);
  msgInner.appendChild(wrap);
  scrollDown();
  return wrap;
}

function updateCacheStats() {
  const rate = stats.total > 0 ? ((stats.hits / stats.total) * 100).toFixed(0) : 0;
  cacheStatsEl.textContent = `cache: ${stats.hits} hits · ${rate}% rate`;
}

async function sendMessage() {
  const message = inputEl.value.trim();
  if (!message || sendBtn.disabled) return;

  // Reset input
  inputEl.value = "";
  inputEl.style.height = "auto";
  document.getElementById("char-count").textContent = 0;
  sendBtn.disabled = true;

  appendMsg("user", message);
  const typingEl = showTyping();

  const start = Date.now();

  try {
    const res = await fetch("https://573c-2409-40f4-4022-37d3-d0f8-a8e6-97c5-8446.ngrok-free.app/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message }),
    });

    const data = await res.json();
    typingEl.remove();

    if (!res.ok) {
      appendMsg("error", "⚠ " + (data.error || "Unknown error"));
    } else {
      const elapsed = ((Date.now() - start) / 1000).toFixed(2);
      stats.total++;
      if (data.cached) stats.hits++; else stats.misses++;
      updateCacheStats();

      appendMsg("ai", data.reply, {
        cached: data.cached,
        deduped: data.deduped,
        cacheAge: data.cacheAge,
        cacheHits: data.cacheHits,
      });

      // Show timing in footer briefly
      const hint = document.getElementById("footer-hint");
      const orig = hint.innerHTML;
      hint.innerHTML = `⏱ ${data.cached ? "⚡ from cache" : "from Ollama"} in ${elapsed}s`;
      setTimeout(() => { hint.innerHTML = orig; }, 3000);
    }
  } catch (err) {
    typingEl.remove();
    appendMsg("error", "⚠ Network error: " + err.message);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// Poll health/cache stats every 30s
async function pollHealth() {
  try {
    const r = await fetch("/health");
    if (r.ok) {
      const d = await r.json();
      document.getElementById("status-text").textContent =
        `${d.model} · ${d.cache.size}/${d.cache.maxSize} cached`;
    }
  } catch {}
}
pollHealth();
setInterval(pollHealth, 30_000);
</script>
</body>
</html>
